services:
  api:
    build: ./aerolive-backend
    container_name: airport_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ML_SERVICE_URL: http://ai:8000
      PORT: "3000"
    ports:
      - "3000:3000"
    restart: unless-stopped

  ai:
    build: ./aerolive-ai
    container_name: airport_ai
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./aerolive-frontend
    container_name: airport_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
