services:
  db:
    image: postgres:16
    container_name: airport_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airport
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build: ./aerolive-backend
    container_name: airport_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/airport
      JWT_SECRET: local-dev-secret
      ML_SERVICE_URL: http://ai:8000
      PORT: "3000"
    command: sh -c "npx prisma db push && sh start.sh"
    depends_on:
      - db
    restart: unless-stopped

  ai:
    build: ./aerolive-ai
    container_name: airport_ai
    restart: unless-stopped

  frontend:
    build: ./aerolive-frontend
    container_name: airport_frontend
    ports:
      - "3080:80"
    depends_on:
      - api
    restart: unless-stopped
